name: Pylint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.14
      uses: actions/setup-python@v3
      with:
        python-version: "3.14"
    - name: Install deps
      run: pip install poetry && poetry install
    - name: Run pylint
      run: poetry run pylint --rcfile=.github/workflows/pylintrc --fail-under=9.5 kishin_trails scripts
    - name: Run ty
      run: poetry run ty check
